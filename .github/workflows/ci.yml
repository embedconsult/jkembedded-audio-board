name: CI

on:
  push:
  pull_request:

env:
  CI_PROJECT_NAME: jkembedded-audio-board

jobs:
  structure:
    name: Project structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify layout
        run: ./ci/check-project-structure.sh

  kicad-artifacts:
    name: KiCad artifacts
    runs-on: ubuntu-latest
    needs: structure
    container:
      image: kicad/kicad:9.0.3-full
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate print assets
        run: |
          mkdir -p step
          kicad-cli sch export pdf --output ${CI_PROJECT_NAME}_sch.pdf ${CI_PROJECT_NAME}.kicad_sch
          kicad-cli sch export bom --format-preset CSV --group-by Value --output ${CI_PROJECT_NAME}_bom.csv ${CI_PROJECT_NAME}.kicad_sch
          kicad-cli pcb export pdf --output ${CI_PROJECT_NAME}_pcb.pdf --layers F.Cu,In1.Cu,In2.Cu,B.Cu,Edge.Cuts,User.Comments,F.Silkscreen --ibt ${CI_PROJECT_NAME}.kicad_pcb
          kicad-cli pcb export pdf --output ${CI_PROJECT_NAME}_pcb_top.pdf --layers F.Cu,Edge.Cuts,User.Comments,F.Silkscreen --ibt ${CI_PROJECT_NAME}.kicad_pcb
          kicad-cli pcb export pdf --output ${CI_PROJECT_NAME}_pcb_bottom.pdf --layers B.Cu,Edge.Cuts,User.Comments,B.Silkscreen --ibt ${CI_PROJECT_NAME}.kicad_pcb
          kicad-cli pcb export pdf --output ${CI_PROJECT_NAME}_pcb_inner1.pdf --layers In1.Cu,Edge.Cuts,User.Comments --ibt ${CI_PROJECT_NAME}.kicad_pcb
          kicad-cli pcb export pdf --output ${CI_PROJECT_NAME}_pcb_inner2.pdf --layers In2.Cu,Edge.Cuts,User.Comments --ibt ${CI_PROJECT_NAME}.kicad_pcb
      - name: Generate fabrication assets
        run: |
          mkdir -p fab/gerbers step
          kicad-cli sch export bom --format-preset CSV --group-by Value --exclude-dnp --output fab/${CI_PROJECT_NAME}_assy_bom.csv ${CI_PROJECT_NAME}.kicad_sch
          kicad-cli pcb drc --format report --output fab/${CI_PROJECT_NAME}_drc.txt ${CI_PROJECT_NAME}.kicad_pcb
          kicad-cli pcb export pos --output fab/${CI_PROJECT_NAME}_assy_pos.pos ${CI_PROJECT_NAME}.kicad_pcb
          kicad-cli pcb export drill --output fab/${CI_PROJECT_NAME}_drill ${CI_PROJECT_NAME}.kicad_pcb
          kicad-cli pcb export gerbers --output fab/gerbers ${CI_PROJECT_NAME}.kicad_pcb
          kicad-cli pcb export step --output step/${CI_PROJECT_NAME}.step ${CI_PROJECT_NAME}.kicad_pcb || true
          cat ${CI_PROJECT_NAME}.kicad_pcb
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kicad-assets
          path: |
            ${CI_PROJECT_NAME}_sch.pdf
            ${CI_PROJECT_NAME}_bom.csv
            ${CI_PROJECT_NAME}_pcb*.pdf
            fab
            step

  firmware-zephyr:
    name: MSPM0 Zephyr build
    runs-on: ubuntu-latest
    needs: structure
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Zephyr
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          zephyr-version: v4.3.0
          toolchains: arm-zephyr-eabi
      - name: Build MSPM0 mux firmware (Zephyr)
        run: ./ci/build-zephyr-mspm0.sh
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mspm0-zephyr-firmware
          path: |
            build/mspm0-zephyr/zephyr/zephyr.hex
            build/mspm0-zephyr/zephyr/zephyr.bin
            build/mspm0-zephyr/zephyr/zephyr.elf
            build/mspm0-zephyr/zephyr/zephyr.map
